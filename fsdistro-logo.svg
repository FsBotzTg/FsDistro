<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <!-- Dark terminal background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#050709"/>
    </radialGradient>

    <!-- Green glow for terminal feel -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="innerShadow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Scanline pattern for CRT effect -->
    <pattern id="scanlines" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="rgba(0,0,0,0.18)"/>
      <rect y="1" width="1" height="2" fill="transparent"/>
    </pattern>

    <!-- Hex grid pattern -->
    <pattern id="hexgrid" x="0" y="0" width="28" height="32" patternUnits="userSpaceOnUse">
      <polygon points="14,2 24,8 24,20 14,26 4,20 4,8" fill="none" stroke="rgba(0,255,100,0.06)" stroke-width="0.8"/>
      <polygon points="28,18 38,24 38,36 28,42 18,36 18,24" fill="none" stroke="rgba(0,255,100,0.06)" stroke-width="0.8"/>
    </pattern>

    <!-- Green terminal gradient for text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7fff8c"/>
      <stop offset="50%" stop-color="#00e550"/>
      <stop offset="100%" stop-color="#00b83a"/>
    </linearGradient>

    <!-- Accent cyan gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffe1"/>
      <stop offset="100%" stop-color="#00b8d4"/>
    </linearGradient>

    <!-- Terminal border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff66" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#00e550" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00cc44" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Clip for rounded rect -->
    <clipPath id="logoClip">
      <rect x="24" y="24" width="432" height="432" rx="48" ry="48"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="24" y="24" width="432" height="432" rx="48" ry="48" fill="url(#bgGrad)"/>

  <!-- Hex grid overlay -->
  <rect x="24" y="24" width="432" height="432" rx="48" ry="48" fill="url(#hexgrid)" clip-path="url(#logoClip)"/>

  <!-- Scanlines overlay -->
  <rect x="24" y="24" width="432" height="432" rx="48" ry="48" fill="url(#scanlines)" clip-path="url(#logoClip)"/>

  <!-- Outer border ring -->
  <rect x="24" y="24" width="432" height="432" rx="48" ry="48" fill="none" stroke="url(#borderGrad)" stroke-width="2.5"/>

  <!-- Inner frame / terminal window chrome -->
  <rect x="50" y="50" width="380" height="380" rx="28" ry="28" fill="none" stroke="rgba(0,255,100,0.13)" stroke-width="1.2"/>

  <!-- Terminal title bar -->
  <rect x="50" y="50" width="380" height="38" rx="28" ry="28" fill="rgba(0,255,80,0.06)"/>
  <rect x="50" y="70" width="380" height="18" fill="rgba(0,255,80,0.06)"/>

  <!-- Window dots -->
  <circle cx="80" cy="69" r="6" fill="#ff5f57" opacity="0.85"/>
  <circle cx="100" cy="69" r="6" fill="#febc2e" opacity="0.85"/>
  <circle cx="120" cy="69" r="6" fill="#28c840" opacity="0.85" filter="url(#softGlow)"/>

  <!-- Title bar text -->
  <text x="240" y="74" font-family="'Courier New', monospace" font-size="11" fill="rgba(0,255,100,0.45)" text-anchor="middle" letter-spacing="3">fsdistro ~ bash</text>

  <!-- === TERMINAL PROMPT LINES (decorative) === -->
  <!-- Line 1 -->
  <text x="76" y="130" font-family="'Courier New', monospace" font-size="11.5" fill="rgba(0,255,100,0.22)" letter-spacing="0.5">root@fsdistro:~$ uname -a</text>
  <!-- Line 2 -->
  <text x="76" y="148" font-family="'Courier New', monospace" font-size="11.5" fill="rgba(0,200,80,0.16)" letter-spacing="0.5">Linux fsdistro 6.x proot aarch64</text>

  <!-- === MAIN ICON: Stylized "Fs" in terminal block === -->

  <!-- Glowing background slab for icon -->
  <rect x="118" y="162" width="244" height="160" rx="14" fill="rgba(0,255,80,0.04)" stroke="rgba(0,255,100,0.12)" stroke-width="1"/>

  <!-- Big "Fs" letterform -->
  <!-- F -->
  <!-- vertical bar of F -->
  <rect x="136" y="178" width="18" height="128" rx="3" fill="url(#textGrad)" filter="url(#glow)"/>
  <!-- top bar of F -->
  <rect x="136" y="178" width="72" height="18" rx="3" fill="url(#textGrad)" filter="url(#glow)"/>
  <!-- mid bar of F -->
  <rect x="136" y="228" width="56" height="16" rx="3" fill="url(#textGrad)" filter="url(#glow)"/>

  <!-- s (lowercase, large) -->
  <!-- top arc of s -->
  <path d="M248 218 Q248 178 292 178 Q320 178 328 196" fill="none" stroke="url(#accentGrad)" stroke-width="17" stroke-linecap="round" filter="url(#glow)"/>
  <!-- middle of s -->
  <path d="M249 218 Q260 244 294 244 Q328 244 329 264" fill="none" stroke="url(#accentGrad)" stroke-width="17" stroke-linecap="round" filter="url(#glow)"/>
  <!-- bottom arc of s -->
  <path d="M249 264 Q248 306 292 306 Q320 306 329 290" fill="none" stroke="url(#accentGrad)" stroke-width="17" stroke-linecap="round" filter="url(#glow)"/>

  <!-- === BLINKING CURSOR BLOCK after icon === -->
  <rect x="340" y="285" width="14" height="24" rx="2" fill="#00ff66" opacity="0.85" filter="url(#softGlow)"/>

  <!-- === WORDMARK === -->
  <!-- "FsDistro" -->
  <text x="240" y="380" font-family="'Courier New', monospace" font-size="28" font-weight="700" fill="url(#textGrad)" text-anchor="middle" letter-spacing="6" filter="url(#softGlow)">FsDistro</text>

  <!-- Tagline -->
  <text x="240" y="404" font-family="'Courier New', monospace" font-size="11" fill="rgba(0,255,160,0.40)" text-anchor="middle" letter-spacing="3.5">TERMUX · PROOT · LINUX</text>

  <!-- Bottom separator line -->
  <line x1="130" y1="415" x2="350" y2="415" stroke="rgba(0,255,100,0.18)" stroke-width="1"/>

  <!-- Bottom shell prompt line -->
  <text x="76" y="440" font-family="'Courier New', monospace" font-size="10.5" fill="rgba(0,255,100,0.20)" letter-spacing="0.5">root@fsdistro:~$ _</text>
</svg>
